<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <radialGradient id="bg30" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff0d4"/>
      <stop offset="100%" stop-color="#e8963c"/>
    </radialGradient>
    <radialGradient id="glow30" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cup30" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#c8960a"/>
    </linearGradient>
  </defs>
  <!-- Outer ring with shimmer border -->
  <circle cx="60" cy="60" r="56" fill="url(#bg30)" stroke="#c07010" stroke-width="2.5"/>
  <!-- Shine arc -->
  <path d="M20 44 A42 42 0 0 1 60 18" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
  <!-- Inner glow -->
  <circle cx="60" cy="60" r="48" fill="url(#glow30)"/>
  <!-- Trophy cup body -->
  <path d="M42 38 H78 L72 72 H48 Z" fill="url(#cup30)" stroke="#c8960a" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Cup shine -->
  <path d="M48 42 Q52 54 50 66" stroke="#ffe680" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- Handles -->
  <path d="M42 46 Q32 46 32 56 Q32 66 42 66" stroke="#c8960a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M78 46 Q88 46 88 56 Q88 66 78 66" stroke="#c8960a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Base stem -->
  <rect x="54" y="72" width="12" height="5" rx="1" fill="#c8960a"/>
  <!-- Base plate -->
  <rect x="46" y="77" width="28" height="5" rx="2.5" fill="#c8960a"/>
  <!-- Stars above cup -->
  <polygon points="60,24 61.5,29 66,29 62.5,31.5 64,36 60,33 56,36 57.5,31.5 54,29 58.5,29" fill="#f5c842" opacity="0.9"/>
  <!-- Day label -->
  <text x="60" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="700" fill="#7a3c00">30 ngày</text>
</svg>
